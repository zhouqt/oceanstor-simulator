services:
  oceanstor-simulator:
    build: .
    container_name: oceanstor-simulator
    ports:
      - "8088:8088"
      - "3260:3260"
    environment:
      - OCEANSTOR_POOL=OpenStack_Pool
      - OCEANSTOR_TARGET_IP=192.168.1.100
    volumes:
      - oceanstor-volumes:/app/volumes
    restart: unless-stopped

volumes:
  oceanstor-volumes:
